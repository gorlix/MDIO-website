    <h1>Distretto Rotaract 2050 — Lombardia Sud &amp; Piacenza</h1>
    <p>Il Distretto Rotaract 2050 abbraccia la Lombardia meridionale e la Provincia di Piacenza: un mosaico di pianura padana, fiumi storici e città d'arte che va da Brescia fino all'Emilia.</p>
    <h2>Macro-zone del distretto</h2>
    <ul>
      <li><strong>Francigena</strong> — Piacenza, Lodi, Cremona Nord: lungo la via dei pellegrini tra Lombardia ed Emilia. Club di Codogno, Fiorenzuola d'Arda, Lodi-Adda, Piacenza, Terre Cremasche.</li>
      <li><strong>Leonessa</strong> — Brescia: sotto il manto della Leonessa d'Italia. Club di Brescia, Brescia Franciacorta, Brescia Ovest, Garda Valle Sabbia, Valtrompia e altri.</li>
      <li><strong>Navigli</strong> — Pavia, Milano Sud: nel cuore della Langobardia Maior. Club di Abbiategrasso, Pavia, Vigevano, Voghera e altri.</li>
      <li><strong>Padana</strong> — Cremona, Mantova: in riva al Po, fra arte gonzaghesca e natura. Club di Cremona, Mantova, Casalmaggiore, Gonzaga-Suzzara e altri.</li>
    </ul>
    <h2>Identità</h2>
    <p>Il 2050 è il distretto della pianura: radici profonde, comunità solide, service concreti. Dalla Franciacorta al Po, passando per i Navigli lombardi e le pievi romaniche, ogni club porta il proprio territorio nel cuore del servizio rotaractiano.</p>
    <p>Sito ufficiale: <a href="https://www.rotaract2050.org/">rotaract2050.org</a></p>
