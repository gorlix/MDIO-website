    <h1>Distretto Rotaract 2041 — Area Metropolitana di Milano</h1>
    <p>Il Distretto Rotaract 2041 riunisce i club Rotaract dell'Area Metropolitana di Milano: la realtà più grande e dinamica del Multidistretto Lombardo. Dove l'energia della metropoli incontra il servizio rotaractiano.</p>
    <h2>Zone del distretto</h2>
    <ul>
      <li><strong>Milano Centro</strong> — cuore della metropoli, networking e cultura</li>
      <li><strong>Milano Est</strong> — innovazione, università, startup</li>
      <li><strong>Milano Nord</strong> — inclusione sociale e terzo settore</li>
      <li><strong>Milano Ovest</strong> — industria creativa e design</li>
      <li><strong>Milano Sud</strong> — solidarietà, periferie e rigenerazione urbana</li>
    </ul>
    <h2>Ambiti di servizio</h2>
    <ul>
      <li>Innovazione — collaborazioni con startup, università e centri di ricerca milanesi</li>
      <li>Solidarietà — service nel terzo settore, periferie e inclusione sociale</li>
      <li>Network professionale — mentorship, career lab e relazioni internazionali</li>
      <li>Cultura — valorizzazione del patrimonio artistico e culturale metropolitano</li>
    </ul>
    <h2>Identità</h2>
    <p>Milano è il laboratorio d'Italia: il 2041 abbraccia questa vocazione e la porta nel Rotaract. Club connessi, aperti alla diversità, proiettati verso il futuro. La città non dorme mai, e nemmeno il servizio.</p>
    <p>Sito ufficiale: <a href="https://www.rotaract2041.com/">rotaract2041.com</a></p>
