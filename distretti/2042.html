    <h1>Distretto Rotaract 2042 — Lombardia Centro &amp; Nord</h1>
    <p>Il Distretto Rotaract 2042 riunisce 18 club e 260 soci nelle province di Bergamo, Como, Lecco, Monza e Brianza, Sondrio e Varese. Dalle Alpi alla Brianza, una rete tra laghi, valli e città d'arte.</p>
    <h2>Aree geografiche</h2>
    <ul>
      <li><strong>Briantea</strong> — Monza e Brianza: club di Merate, Monza, Monza Brianza, Vimercate. Il cuore del Made in Italy manifatturiero.</li>
      <li><strong>Lariana</strong> — Como, Lecco, Sondrio: club di Cantù, Como, Erba-Laghi, Lecco, Sondrio. Dalle Alpi ai laghi, fellowship scenografica.</li>
      <li><strong>Olona</strong> — Varese: club di Magenta, Malpensa, Saronno, Varese. Dal Palio all'innovazione tecnologica.</li>
      <li><strong>Orobica</strong> — Bergamo: club di Bergamo, Clusone, Treviglio. Zona madre dell'End Polio Now.</li>
    </ul>
    <h2>Service principali</h2>
    <ul>
      <li>Tutela del patrimonio naturale — collaborazione con Plastic Free e comuni del territorio</li>
      <li>Salute e ricerca — service "Brainy, coltiviamo la ricerca", corsi BLSD, progetto Teddy Bear</li>
      <li>Inclusione — Camp dell'Amicizia, collaborazione con l'Arca del Seprio</li>
    </ul>
    <h2>Identità</h2>
    <p>Fondato nel 1968, il Distretto 2042 unisce la vocazione industriale della Brianza alla bellezza naturalistica dei grandi laghi prealpini e delle valli alpine. Fellowship concreta, radicata nel territorio, con un forte senso di appartenenza.</p>
    <p>Sito ufficiale: <a href="https://www.distrettorotaract2042.it/">distrettorotaract2042.it</a> — Instagram: <a href="https://www.instagram.com/rotaract2042/">@rotaract2042</a></p>
