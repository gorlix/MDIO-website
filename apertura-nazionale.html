    <h1>Apertura Nazionale Rotaract 2026 — MDIO</h1>
    <p>Tre giorni per aprire l'anno rotaractiano insieme: Milano, Monza e Lago d'Iseo — 19, 20 e 21 Settembre 2026.</p>
    <h2>Programma</h2>
    <ul>
      <li><strong>Venerdì 19 Settembre — Milano:</strong> Serata "Mille e una Notte", cena 4 portate, ~€75 tutto incluso. Max 130 posti.</li>
      <li><strong>Sabato 20 Settembre — Monza:</strong> Gala all'Autodromo Nazionale, tour pista, cena di gala, €75 + IVA. Max 350 posti.</li>
      <li><strong>Domenica 21 Settembre — Iseo:</strong> Sessione ufficiale, passaggio di consegne, pranzo conviviale sul Lago d'Iseo con ospite d'eccezione.</li>
    </ul>
    <h2>Pacchetti</h2>
    <ul>
      <li>Solo Milano: ~€75 (tutto incluso)</li>
      <li>Solo Monza: €75 + IVA 10%</li>
      <li>Weekend Completo: TBD (tutti e tre i giorni + Hotel Falcone 4★ + navette)</li>
    </ul>
    <p>Organizzatore: MDIO — <a href="https://multidistrettolombardo.org">multidistrettolombardo.org</a></p>
