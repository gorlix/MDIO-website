    <h1>Apertura Nazionale Rotaract 2026 — MDIO</h1>
    <p>L'Apertura Nazionale Rotaract 2026 è il primo evento nazionale diffuso su tre distretti: tre giorni per aprire l'anno rotaractiano tutti insieme tra Milano, Monza e il Lago d'Iseo — 18, 19 e 20 Settembre 2026. Organizzato da MDIO — Multidistretto Rotaract Italia Ovest (distretti 2041, 2042, 2050). Prezzo bloccato, nessun dynamic pricing. Navette incluse in tutti i pacchetti con pernotto.</p>

    <h2>Programma delle tre giornate</h2>
    <ul>
      <li><strong>Venerdì 18 Settembre — Milano · Serata "Mille e una Notte":</strong> Ambientazione ispirata ad Agrabah. Ore 20:00 ingresso e accoglienza, cena con live show orientale (4 portate), DJ set esclusivo. Navette di rientro verso le 2:00 per chi alloggia in hotel. Dress code: tocco arabeggiante. Zona Tibaldi-Bocconi (bus 65). Biglietto singolo: €80.</li>
      <li><strong>Sabato 19 Settembre — Monza · Gala all'Autodromo:</strong> Mattina: lavori nazionali alla Sala Maddalena (Via Santa Maddalena 7, Monza). Pomeriggio: attività facoltative. Ore 18:30 navetta dall'Hotel Falcone verso l'Autodromo. Ore 19:00 aperitivo standing nell'area box con auto da esposizione dello sponsor e DJ set. Ore 20:00 cena di gala 4 portate (antipasto, primo, secondo, dolce), vino senza limiti, drink incluso. Dress code: black tie. Biglietto singolo: €155 (hotel e navette non inclusi).</li>
      <li><strong>Domenica 20 Settembre — Sale Marasino · Conviviale sul Lago d'Iseo:</strong> Ore 12:30 arrivo e accoglienza. Conviviale con relatori d'eccezione. Chiusura ufficiale con passaggio di consegne al Distretto Rotaract 2071 per il S.I.R.D.E. Biglietto singolo: €55 (hotel e navette non inclusi).</li>
    </ul>

    <h2>Hotel ufficiale</h2>
    <p>Hotel Falcone 4★ — centro di Monza. Incluso in tutti i pacchetti multi-giorno (Experience). A 15 minuti da Milano in treno.</p>

    <h2>Pacchetti Experience (con hotel incluso — navette sempre incluse)</h2>
    <ul>
      <li><strong>Sotto il cielo di Lombardia</strong> — Weekend completo 18+19+20 Set: Milano + Monza + Iseo + 2 notti Hotel Falcone 4★ + navette. <strong>€435 a persona.</strong></li>
      <li><strong>Aladino in pista</strong> — Venerdì &amp; Sabato 18+19 Set: Serata Milano + Gala Monza + 2 notti Hotel 4★ + navette. <strong>€380 a persona.</strong></li>
      <li><strong>3…2…1… lancio</strong> — Sabato &amp; Domenica 19+20 Set: Gala Monza + Iseo + 1 notte Hotel 4★ + navette. <strong>€285 a persona.</strong></li>
      <li><strong>Pit Stop</strong> — Sabato 19 Set con pernotto: Gala Autodromo Monza + 1 notte Hotel Falcone 4★ + navette hotel ↔ autodromo. <strong>€230 a persona.</strong></li>
    </ul>

    <h2>Biglietti Singoli (senza hotel, senza navette)</h2>
    <ul>
      <li><strong>Le mille e una notte</strong> — Venerdì 18 Set · Milano: cena con live show e DJ set. <strong>€80 a persona.</strong></li>
      <li><strong>Il tempio della velocità</strong> — Sabato 19 Set · Monza: aperitivo area box + cena gala 4 portate + DJ set all'Autodromo. <strong>€155 a persona.</strong></li>
      <li><strong>Un lago di stelle</strong> — Domenica 20 Set · Sale Marasino: relatori + pranzo conviviale sul Lago d'Iseo. <strong>€55 a persona.</strong></li>
    </ul>

    <p><a href="shop.html">Acquista i biglietti — Apertura Nazionale Rotaract 2026</a></p>

    <h2>Domande frequenti</h2>
    <dl>
      <dt>Le navette sono incluse?</dt>
      <dd>Sì, le navette sono sempre incluse nei pacchetti con pernotto. Non sono incluse nei biglietti singoli.</dd>
      <dt>Posso partecipare a un solo giorno?</dt>
      <dd>Sì, con i Biglietti Singoli: Milano €80, Monza €155, Iseo €55.</dd>
      <dt>Come arrivo a Monza?</dt>
      <dd>Da Milano Centrale: 15 minuti in treno. Da Malpensa: Malpensa Express + cambio a Centrale (~1h). Da Linate: bus + metro o taxi. Da Bergamo Orio: navetta + treno (~1h15).</dd>
    </dl>

    <h2>Organizzatori</h2>
    <p>Organizzato da MDIO — Multidistretto Rotaract Italia Ovest, in collaborazione con i distretti:</p>
    <ul>
      <li><a href="distretti/2041.html">Distretto Rotaract 2041 — Area Metropolitana di Milano (28 club, 612 soci)</a></li>
      <li><a href="distretti/2042.html">Distretto Rotaract 2042 — Lombardia Centro &amp; Nord (24 club, 487 soci)</a></li>
      <li><a href="distretti/2050.html">Distretto Rotaract 2050 — Lombardia Sud &amp; Piacenza (21 club, 398 soci)</a></li>
    </ul>
